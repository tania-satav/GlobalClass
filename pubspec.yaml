name: HydroMe
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.19.0

  cupertino_icons: ^1.0.8

  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^7.2.0

  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.2.3

  provider: ^6.1.2   # <-- missing before (important)

  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true


  assets:
    - assets/plants/
    - assets/icons/
    - assets/grass.png
    - assets/grass1.png
    - assets/images/
    

  fonts:
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Regular.ttf


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/watericonwhite.png"